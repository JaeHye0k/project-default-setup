name: 🐛 버그 리포트
description: 버그를 발견하셨나요? 상세한 내용을 알려주세요.
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## 🙏 버그 리포트를 작성해 주셔서 감사합니다!
        
        가능한 상세하게 작성해주시면 문제 해결에 큰 도움이 됩니다.
        
        ---

  - type: textarea
    id: bug-description
    attributes:
      label: 🐛 버그 설명
      description: 발생한 버그에 대해 명확하고 간결하게 설명해주세요.
      placeholder: 버그가 무엇인지 설명해주세요...
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: 🔄 재현 단계
      description: 버그를 재현하기 위한 단계를 상세히 작성해주세요.
      placeholder: |
        1. '...'로 이동
        2. '...'를 클릭
        3. '...'까지 스크롤
        4. 오류 발생
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: ✅ 예상 동작
      description: 정상적으로 작동했을 때 예상되는 동작을 설명해주세요.
      placeholder: 어떻게 동작해야 한다고 생각하셨나요?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: ❌ 실제 동작
      description: 실제로 발생한 동작을 설명해주세요.
      placeholder: 실제로 어떤 일이 발생했나요?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 📸 스크린샷
      description: 가능하다면 문제를 설명하는 스크린샷을 첨부해주세요.
      placeholder: 이미지를 드래그 앤 드롭하거나 붙여넣기 해주세요.
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: 🚨 심각도
      description: 버그의 심각도를 선택해주세요.
      options:
        - 🔴 Critical - 서비스 전체 중단
        - 🟠 High - 주요 기능 장애
        - 🟡 Medium - 부분적 기능 장애
        - 🟢 Low - 사소한 문제
    validations:
      required: true

  - type: dropdown
    id: browsers
    attributes:
      label: 🌐 브라우저
      description: 어떤 브라우저에서 문제가 발생했나요? (해당되는 경우)
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Opera
        - 기타
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: 💻 운영체제
      description: 사용 중인 운영체제와 버전을 입력해주세요.
      placeholder: "예: macOS 14.0, Windows 11, Ubuntu 22.04"
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: 📦 버전
      description: 문제가 발생한 애플리케이션 버전을 입력해주세요.
      placeholder: "예: v1.2.3"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 📋 로그 / 에러 메시지
      description: 관련 로그나 에러 메시지가 있다면 붙여넣기 해주세요.
      placeholder: 콘솔 로그, 에러 스택 트레이스 등...
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: 📝 추가 정보
      description: 문제에 대한 추가적인 컨텍스트가 있다면 작성해주세요.
      placeholder: 기타 도움이 될 만한 정보...
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: ✔️ 체크리스트
      description: 이슈 제출 전 확인해주세요.
      options:
        - label: 기존 이슈에서 동일한 버그가 보고되지 않았는지 확인했습니다.
          required: true
        - label: 최신 버전에서 테스트했습니다.
          required: false
